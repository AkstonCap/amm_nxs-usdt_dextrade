<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">NXS USDT AMM Logo</title>
  <desc id="desc">Circular liquidity pool mark with NXS and USDT labels for the automated market maker module.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22d3ee" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="28" filter="url(#softGlow)"/>

  <path d="M 186 178 A 108 108 0 0 1 328 220" fill="none" stroke="#93c5fd" stroke-width="14" stroke-linecap="round"/>
  <path d="M 326 214 L 344 212 L 336 229" fill="none" stroke="#93c5fd" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 326 334 A 108 108 0 0 1 184 292" fill="none" stroke="#6ee7b7" stroke-width="14" stroke-linecap="round"/>
  <path d="M 186 298 L 168 300 L 176 283" fill="none" stroke="#6ee7b7" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="116" y="214" width="132" height="46" rx="23" fill="url(#pill)" stroke="#60a5fa" stroke-width="2"/>
  <text x="182" y="244" text-anchor="middle" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#e2e8f0">NXS</text>

  <rect x="264" y="252" width="132" height="46" rx="23" fill="url(#pill)" stroke="#34d399" stroke-width="2"/>
  <text x="330" y="282" text-anchor="middle" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#e2e8f0">USDT</text>

  <text x="256" y="404" text-anchor="middle" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800" fill="#f8fafc">AMM</text>
</svg>
